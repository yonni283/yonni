<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌠 METEOR DODGE · 15 SKINS</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="game-wrapper">
  <div class="game-container" id="gameContainer">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <button class="death-btn revive-btn" id="reviveButton">💫 REVIVE (30💰)</button>
    <button class="death-btn restart-death-btn" id="restartDeathButton">🔄 RESTART</button>
    <button class="power-btn" id="powerButton">❄️ SLOW</button>
    
    <div class="power-indicator" id="powerIndicator" style="display:none;">
      <span id="powerIcon">⚡</span>
      <span id="powerTimer">OK</span>
    </div>
    
    <div class="info-panel">
      <div class="score-box"><span>⭐</span> <span id="scoreDisplay">0</span></div>
      <div class="speed-box"><span>⚡</span> <span id="speedDisplay">1.0x</span></div>
      <div class="coin-box"><span>🪙</span> <span id="coinDisplay">0</span></div>
      <button class="shop-btn" id="shopButton">🏪 SHOP</button>
      <button class="restart-btn" id="restartButton">↺ RESTART</button>
    </div>
  </div>
  
  <div class="leaderboard">
    <h3>🏆 LEADERBOARD <span>(top 5)</span></h3>
    <ol id="leaderboardList"><li>—</li></ol>
  </div>
  
  <div class="hint-text">🖱️ Move mouse/touch · Collect 🪙 · Buy skins for powers!</div>
</div>

<!-- Shop Modal -->
<div class="modal" id="shopModal">
  <div class="modal-content">
    <h2>🛒 SKIN SHOP</h2>
    <div class="shop-coins">Your Coins: 🪙 <span id="shopCoinDisplay">0</span></div>
    
    <div class="skin-grid" id="skinGrid">
      <!-- Skins generated by JS -->
    </div>
    
    <button class="close-btn" onclick="closeShop()">❌ CLOSE SHOP</button>
  </div>
</div>

<!-- Name Entry Modal -->
<div class="modal" id="nameModal">
  <div class="modal-content name-modal-content">
    <h2>🏆 NEW RECORD!</h2>
    <p style="color:white; text-align:center; font-size:1.2rem;">
      Your Score: <span style="color:#ffd700; font-size:1.8rem;" id="finalScoreDisplay">0</span>
    </p>
    <p style="color:#aaa; text-align:center;">Enter your name for the leaderboard:</p>
    <input type="text" id="playerNameInput" placeholder="Your name..." maxlength="15">
    <div style="display:flex; gap:10px; justify-content:center;">
      <button onclick="submitScore()" style="background:linear-gradient(45deg, #ffd700, #ffaa00); border:none; padding:12px 30px; border-radius:25px; font-weight:bold; cursor:pointer; font-size:1rem;">✅ SUBMIT</button>
      <button onclick="skipLeaderboard()" style="background:#555; border:none; padding:12px 30px; border-radius:25px; color:white; cursor:pointer; font-size:1rem;">SKIP</button>
    </div>
  </div>
</div>

<script src="./game.js"></script>
</body>
</html>
